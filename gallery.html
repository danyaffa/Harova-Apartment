  <div class="lightbox-overlay" id="lightbox-overlay" aria-hidden="true">

  <!-- ✅ JSON-LD: ImageGallery + Breadcrumb -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ImageGallery",
    "name": "Harova Apartment Photo Gallery",
    "description": "Full photo gallery of Harova Apartment in the Jaffa Flea Market – living room, bedrooms, kitchen, bathrooms, safe room, parking and surroundings.",
    "url": "https://holidayapartmenttelavivjaffa.com/gallery",
    "about": {
      "@type": "VacationRental",
      "name": "Harova Apartment",
      "url": "https://holidayapartmenttelavivjaffa.com/"
    }
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://holidayapartmenttelavivjaffa.com/" },
      { "@type": "ListItem", "position": 2, "name": "Gallery", "item": "https://holidayapartmenttelavivjaffa.com/gallery" }
    ]
  }
  </script>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    // Lightbox logic
    (function () {
      const overlay = document.getElementById("lightbox-overlay");
      const lightboxImg = document.getElementById("lightbox-image");
      const closeBtn = document.getElementById("lightbox-close");
      const prevBtn = document.getElementById("lightbox-prev");
      const nextBtn = document.getElementById("lightbox-next");
      const images = Array.from(document.querySelectorAll(".gallery-item img"));

      if (!images.length) return;

      let currentIndex = 0;

      function openLightbox(index) {
        currentIndex = index;
        lightboxImg.src = images[index].src;
        overlay.classList.add("open");
        overlay.setAttribute("aria-hidden", "false");
      }

      function closeLightbox() {
        overlay.classList.remove("open");
        overlay.setAttribute("aria-hidden", "true");
      }

      function showNext(delta) {
        currentIndex = (currentIndex + delta + images.length) % images.length;
        lightboxImg.src = images[currentIndex].src;
      }

      images.forEach((img, index) => {
        img.style.cursor = "pointer";
        img.addEventListener("click", () => openLightbox(index));
      });

      closeBtn.addEventListener("click", closeLightbox);

      overlay.addEventListener("click", (e) => {
        if (e.target === overlay) closeLightbox();
      });

      prevBtn.addEventListener("click", () => showNext(-1));
      nextBtn.addEventListener("click", () => showNext(1));

      document.addEventListener("keydown", (e) => {
        if (!overlay.classList.contains("open")) return;
        if (e.key === "Escape") closeLightbox();
        if (e.key === "ArrowRight") showNext(1);
        if (e.key === "ArrowLeft") showNext(-1);
      });
    })();
  </script>
